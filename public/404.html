<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting | KORAB Jastarnia</title>
    <script>
      const isGitHubProjectPage =
        window.location.hostname.endsWith("github.io") && window.location.pathname.startsWith("/Korab/");
      window.location.replace(isGitHubProjectPage ? "/Korab/" : "/");
    </script>
  </head>
  <body>
    <p>Redirecting to KORAB Jastarnia.</p>
    <p>
      <a href="/">Open the home page</a>
      <span aria-hidden="true"> | </span>
      <a href="/Korab/">Open the GitHub Pages home page</a>
    </p>
  </body>
</html>
